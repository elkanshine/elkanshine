#progress-fill{height:100%;width:0%;background:#00ff41;transition:width 0.3s;}
#screen{background:#050a05;padding:20px;min-height:380px;position:relative;overflow:hidden;}

#output{position:relative;z-index:2;font-size:13px;line-height:1.7;}

#cursor{display:inline-block;width:8px;height:14px;background:#00ff41;animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#statusbar{background:#060e06;border-top:1px solid #0f1f0f;padding:8px 16px;display:flex;gap:20px;font-size:11px;color:#1a4a1a;letter-spacing:1px;flex-wrap:wrap;}
.sb-item{display:flex;gap:6px;}.sb-item span:last-child{color:#00ff41;}
#footer{margin-top:16px;font-size:11px;color:#1a4a1a;letter-spacing:2px;text-align:center;}
#footer a{color:#00b32c;text-decoration:none;}#footer a:hover{color:#00ff41;}

const output=document.getElementById('output');
const sbMode=document.getElementById('sb-mode');
const sbBugs=document.getElementById('sb-bugs');
const sbCoffee=document.getElementById('sb-coffee');
const sbStatus=document.getElementById('sb-status');
const progressFill=document.getElementById('progress-fill');
let timeouts=[];
function clearTimeouts(){timeouts.forEach(clearTimeout);timeouts=[];}
function runFrame(idx){
  clearTimeouts();
  const frame=frames[idx];
  output.innerHTML='';
  sbMode.textContent=frame.mode;
  sbBugs.textContent=frame.bugs;
  sbStatus.textContent=frame.status;
  const coffeeStops=['░░░░░','██░░░','████░','█████','█████'];
  sbCoffee.textContent=coffeeStops[Math.min(idx,coffeeStops.length-1)];
  progressFill.style.width=(((idx+1)/frames.length)*100)+'%';
  let maxDelay=0;
  frame.lines.forEach(line=>{
    maxDelay=Math.max(maxDelay,line.d+80);
    const t=setTimeout(()=>{
      const el=document.createElement('div');
      el.className='line '+(colorMap[line.t]||'c-dim');
      el.textContent=line.s;
      output.appendChild(el);
      output.scrollTop=output.scrollHeight;
    },line.d);
    timeouts.push(t);
  });
  const ct=setTimeout(()=>{
    const el=document.createElement('div');
    el.className='line c-green';
    const cursor=document.createElement('span');
    cursor.id='cursor';
    el.appendChild(cursor);
    output.appendChild(el);
  },maxDelay);
  timeouts.push(ct);
  const nt=setTimeout(()=>{runFrame((idx+1)%frames.length);},maxDelay+2200);
  timeouts.push(nt);
}
